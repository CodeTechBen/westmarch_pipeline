<!DOCTYPE html>
<html>
<head>
    <title>The Tavern Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
    <h1>The Tavern</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Class Stats</a>
        <a href="/sessions">Sessions</a>
        <a href="#">Items</a>
    </nav>
</header>

<main>

<div class="title-box">
    <h2>Tavern Westmarches Dashboard</h2>
</div>

<input type="text" id="search" placeholder="Search characters, players, spells...">
<div id="search-results"></div>

<div class="grid">

    <div class="card">
        <h3>Quick Stats</h3>
        <p id="characters"></p>
        <p id="players"></p>
        <p id="classes"></p>
    </div>

    <div class="card">
        <h3>Recent Sessions</h3>
        <ul id="sessions"></ul>
    </div>

    <div class="card">
        <h3>Class Distribution</h3>
        <canvas id="classChart"></canvas>
    </div>

</div>

</main>

<script src="/static/main.js"></script>
</body>
</html>
